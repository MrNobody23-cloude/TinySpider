services:
  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./packages/api/src/db/clickhouse-schema.sql:/docker-entrypoint-initdb.d/01-clickhouse-schema.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: insightdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/api/src/db/postgres-schema.sql:/docker-entrypoint-initdb.d/01-postgres-schema.sql:ro

  api:
    build:
      context: ./packages/api
    env_file:
      - .env.example
    environment:
      NODE_ENV: production
      PORT: 3000
      CLICKHOUSE_URL: http://clickhouse:8123
      REDIS_URL: redis://redis:6379
      POSTGRES_HOST: postgres
      GEOIP_MMDB_PATH: /app/data/GeoLite2-City.mmdb
    depends_on:
      - clickhouse
      - redis
      - postgres
    ports:
      - "3000:3000"

  dashboard:
    build:
      context: ./packages/dashboard
    environment:
      NODE_ENV: production
      VITE_API_BASE: http://localhost/api
    ports:
      - "5173:5173"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
      - dashboard
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  clickhouse_data:
  postgres_data:
