events {}

http {
  upstream api_upstream {
    server api:3000;
  }

  upstream dashboard_upstream {
    server dashboard:5173;
  }

  upstream demo_upstream {
    server demo-site:8080;
  }

  server {
    listen 80;

    # Serve tracker script directly (cached)
    location /tracker.js {
      proxy_pass http://api_upstream;
      proxy_http_version 1.1;
      add_header Cache-Control "public, max-age=86400";
    }

    # Event collection
    location /collect {
      proxy_pass http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API endpoints
    location /api/ {
      proxy_pass http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check (used by docker-compose)
    location /health {
      proxy_pass http://api_upstream/api/health;
    }

    # WebSocket for live events
    location /ws/live {
      proxy_pass http://api_upstream/ws/live;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
    }

    # Demo site (port 8080)
    location /demo/ {
      proxy_pass http://demo_upstream/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Dashboard (default)
    location / {
      proxy_pass http://dashboard_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
