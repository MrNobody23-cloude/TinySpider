version: '3.8'

# ═══════════════════════════════════════════════════
# TinySpider — Production Docker Compose Override
# ═══════════════════════════════════════════════════
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  clickhouse:
    environment:
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

  redis:
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped

  postgres:
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-insightdb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    restart: unless-stopped

  api:
    environment:
      NODE_ENV: production
      LOG_LEVEL: warn
      IP_HASH_SALT: ${IP_HASH_SALT:?IP_HASH_SALT is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  dashboard:
    restart: unless-stopped

  nginx:
    restart: unless-stopped

  # ─── Demo Site (optional) ───
  demo-site:
    build:
      context: ./packages/demo-site
      dockerfile: Dockerfile
    container_name: insight-demo-site
    environment:
      DEMO_PORT: 8080
    ports:
      - "8080:8080"
    networks:
      - insight-network
    restart: unless-stopped
